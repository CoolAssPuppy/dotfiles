name: {{APP_NAME_NOSPACE}}
options:
  bundleIdPrefix: {{BUNDLE_ID}}
  deploymentTarget:
    iOS: "{{MIN_IOS}}"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages: {}
  # Add SPM packages here. Example:
  # KeychainAccess:
  #   url: https://github.com/kishikawakatsumi/KeychainAccess
  #   from: "4.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "{{MIN_IOS}}"
    TARGETED_DEVICE_FAMILY: "{{DEVICE_FAMILY}}"  # 1=iPhone, 2=iPad, 1,2=Universal
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: {{TEAM_ID}}
    ENABLE_BITCODE: NO   # Bitcode is deprecated as of Xcode 14.

targets:
  {{APP_NAME_NOSPACE}}:
    type: application
    platform: iOS
    scheme:
      testTargets:
        - {{APP_NAME_NOSPACE}}Tests
      gatherCoverageData: true
    sources:
      - path: Source
      - path: Resources
        optional: true
      - path: Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: {{BUNDLE_ID}}
        PRODUCT_NAME: "{{APP_NAME}}"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: {{APP_NAME_NOSPACE}}.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Required for App Store: at least one of these supported orientations.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  {{APP_NAME_NOSPACE}}Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: {{APP_NAME_NOSPACE}}
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/{{APP_NAME}}.app/{{APP_NAME}}"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: {{BUNDLE_ID}}Tests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "{{MIN_IOS}}"
        CODE_SIGN_STYLE: Automatic
