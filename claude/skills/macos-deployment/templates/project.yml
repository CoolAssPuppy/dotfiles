name: {{APP_NAME_NOSPACE}}
options:
  bundleIdPrefix: {{BUNDLE_ID}}
  deploymentTarget:
    macOS: "{{MIN_MACOS}}"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  # Add other SPM packages here. Example:
  # KeychainAccess:
  #   url: https://github.com/kishikawakatsumi/KeychainAccess
  #   from: "4.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "{{MIN_MACOS}}"
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: {{TEAM_ID}}
  configs:
    Debug:
      # Hardened runtime breaks XCTest's runtime injection into the host app.
      ENABLE_HARDENED_RUNTIME: NO
      # Xcode 15+ mergeable libraries split the host into "{{APP_NAME}}" +
      # "{{APP_NAME}}.debug.dylib" in Debug, but the test bundle's rpath
      # doesn't reach the host's MacOS directory so dlopen fails with
      # "Library not loaded: @rpath/{{APP_NAME}}.debug.dylib". Force a
      # statically merged Debug binary so xcodebuild test works.
      MERGED_BINARY_TYPE: manual
      MERGEABLE_LIBRARY: NO
    Release:
      ENABLE_HARDENED_RUNTIME: YES

targets:
  {{APP_NAME_NOSPACE}}:
    type: application
    platform: macOS
    scheme:
      testTargets:
        - {{APP_NAME_NOSPACE}}Tests
      gatherCoverageData: true
    sources:
      - path: Source
      - path: Images.xcassets
      - path: Resources
        optional: true
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: {{BUNDLE_ID}}
        PRODUCT_NAME: "{{APP_NAME}}"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: {{APP_NAME_NOSPACE}}.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LS_MINIMUM_SYSTEM_VERSION: "{{MIN_MACOS}}"
        COMBINE_HIDPI_IMAGES: YES
  {{APP_NAME_NOSPACE}}Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: {{APP_NAME_NOSPACE}}
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/{{APP_NAME}}.app/Contents/MacOS/{{APP_NAME}}"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: {{BUNDLE_ID}}Tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "{{MIN_MACOS}}"
        # See Debug config above for why hardened runtime is off here.
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
